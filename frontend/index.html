<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rugby Pro - Acceso con PIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .auth-section { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-box { display: none; padding: 20px; }
        .app-box-container { display: none; padding: 20px; }
        .card { border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: none; }
        .nav-pills .nav-link { border: none; padding: 10px 25px; font-weight: 500; transition: 0.3s; cursor: pointer; }
        .nav-pills .nav-link.active { background-color: #1a237e; color: white !important; }
        .form-control { border-radius: 8px; border: 2px dashed #fab005; padding: 12px; margin-top: 15px; }
        .pin-display { font-size: 1.5rem; letter-spacing: 5px; color: #e67e22; }
    </style>
</head>
<body>

<div id="auth-section" class="auth-section">
    <div class="card auth-box" style="display: block; width: 400px;">
        <h3 class="text-center mb-4">🏉 Rugby App Secure</h3>
        <ul class="nav nav-pills nav-justified mb-4">
            <li class="nav-item">
                <button id="tab-login" class="nav-link active">Entrar</button>
            </li>
            <li class="nav-item">
                <button id="tab-reg" class="nav-link">Nuevo Usuario 2</button>
            </li>
        </ul>

        <div id="form-body">
            <div class="mb-3">
                <label class="small fw-bold">Usuario/eMail</label>
                <input type="text" id="username" class="form-control" placeholder="Ej: pablo_rugby">
            </div>
            <div class="mb-3">
                <label class="small fw-bold">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="********">
            </div>
            <div id="pin-area" class="mb-4">
                <label class="small fw-bold text-primary">🛡️ Tu PIN de Seguridad</label>
                <input type="text" id="security_token" class="form-control border-primary" placeholder="Introduce tu PIN">
            </div>
            <button id="btn-auth" class="btn btn-success w-100 fw-bold shadow-sm">Entrar al Sistema</button>
        </div>

        <div id="msg-container" class="mt-3 text-center">
            <p id="msg" class="small fw-bold"></p>
            <div id="pin-result" style="display: none;" class="pin-display">
                <strong class="badge bg-light text-dark shadow-sm">ANOTA TU PIN</strong>
                <span id="pin-number" class="d-block mt-2 text-warning">0000</span>
            </div>
        </div>
    </div>
</div>

<div id="app-section" class="app-box-container">
    <nav class="navbar bg-dark text-white p-3 d-flex justify-content-between align-items-center shadow-sm">
        <h4 class="m-0">🏉 Panel <span id="user-display" class="text-warning"></span></h4>
        <button id="btn-logout" class="btn btn-outline-light btn-sm fw-bold">Cerrar Sesión</button>
    </nav>
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card p-4 mb-4">
                <h5>🆕 Nuevo Jugador</h5>
                <input type="text" id="j-nombre" class="form-control mb-2" placeholder="Nombre">
                <input type="text" id="j-pos" class="form-control mb-2" placeholder="Posición">
                <input type="text" id="j-eq" class="form-control mb-3" placeholder="Equipo">
                <button id="btn-save" class="btn btn-primary w-100 fw-bold">Guardar Jugador</button>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card p-4">
                <h5>📊 Plantilla en PostgreSQL</h5>
                <table class="table table-hover mt-3">
                    <thead class="table-dark">
                        <tr><th>ID</th><th>Nombre</th><th>Posición</th><th>Equipo</th></tr>
                    </thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
