name: Validar App Rugby

on: [push] # Se activa cada vez que subes algo a GitHub

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # 1. Levantamos una base de datos temporal para el test
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: rugby_admin
          POSTGRES_PASSWORD: Vir-24
          POSTGRES_DB: rugby_db
        ports:
          - 5432:5432
        # Aseguramos que la DB esté lista antes de empezar
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install pytest httpx fastapi uvicorn sqlalchemy psycopg2-binary passlib bcrypt slowapi python-jose[cryptography] python-multipart
          pip install -r backend/requirements.txt

      - name: Ejecutar Pruebas Automáticas
        env:
          # Obligamos a la App a mirar a localhost (donde está el service db)
          DB_HOST: localhost
          POSTGRES_USER: rugby_admin
          POSTGRES_PASSWORD: Vir-24
          POSTGRES_DB: rugby_db
          JWT_SECRET: clave-test-github
        run: |
          pytest backend/test_main.py
